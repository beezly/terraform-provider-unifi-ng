provider:
  name: unifi

resources:
  unifi_network:
    create:
      path: /v1/sites/{siteId}/networks
      method: POST
    read:
      path: /v1/sites/{siteId}/networks/{networkId}
      method: GET
    update:
      path: /v1/sites/{siteId}/networks/{networkId}
      method: PUT
    delete:
      path: /v1/sites/{siteId}/networks/{networkId}
      method: DELETE

  unifi_firewall_policy:
    create:
      path: /v1/sites/{siteId}/firewall/policies
      method: POST
    read:
      path: /v1/sites/{siteId}/firewall/policies/{firewallPolicyId}
      method: GET
    update:
      path: /v1/sites/{siteId}/firewall/policies/{firewallPolicyId}
      method: PUT
    delete:
      path: /v1/sites/{siteId}/firewall/policies/{firewallPolicyId}
      method: DELETE

  unifi_firewall_zone:
    create:
      path: /v1/sites/{siteId}/firewall/zones
      method: POST
    read:
      path: /v1/sites/{siteId}/firewall/zones/{firewallZoneId}
      method: GET
    update:
      path: /v1/sites/{siteId}/firewall/zones/{firewallZoneId}
      method: PUT
    delete:
      path: /v1/sites/{siteId}/firewall/zones/{firewallZoneId}
      method: DELETE

  unifi_acl_rule:
    create:
      path: /v1/sites/{siteId}/acl-rules
      method: POST
    read:
      path: /v1/sites/{siteId}/acl-rules/{aclRuleId}
      method: GET
    update:
      path: /v1/sites/{siteId}/acl-rules/{aclRuleId}
      method: PUT
    delete:
      path: /v1/sites/{siteId}/acl-rules/{aclRuleId}
      method: DELETE

  unifi_dns_policy:
    create:
      path: /v1/sites/{siteId}/dns/policies
      method: POST
    read:
      path: /v1/sites/{siteId}/dns/policies/{dnsPolicyId}
      method: GET
    update:
      path: /v1/sites/{siteId}/dns/policies/{dnsPolicyId}
      method: PUT
    delete:
      path: /v1/sites/{siteId}/dns/policies/{dnsPolicyId}
      method: DELETE

  unifi_traffic_matching_list:
    create:
      path: /v1/sites/{siteId}/traffic-matching-lists
      method: POST
    read:
      path: /v1/sites/{siteId}/traffic-matching-lists/{trafficMatchingListId}
      method: GET
    update:
      path: /v1/sites/{siteId}/traffic-matching-lists/{trafficMatchingListId}
      method: PUT
    delete:
      path: /v1/sites/{siteId}/traffic-matching-lists/{trafficMatchingListId}
      method: DELETE

  unifi_wifi_broadcast:
    create:
      path: /v1/sites/{siteId}/wifi/broadcasts
      method: POST
    read:
      path: /v1/sites/{siteId}/wifi/broadcasts/{wifiBroadcastId}
      method: GET
    update:
      path: /v1/sites/{siteId}/wifi/broadcasts/{wifiBroadcastId}
      method: PUT
    delete:
      path: /v1/sites/{siteId}/wifi/broadcasts/{wifiBroadcastId}
      method: DELETE

data_sources:
  unifi_sites:
    read:
      path: /v1/sites
      method: GET

  unifi_clients:
    read:
      path: /v1/sites/{siteId}/clients
      method: GET

  unifi_devices:
    read:
      path: /v1/sites/{siteId}/devices
      method: GET
